name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
          VITE_AUTH_ENDPOINT: ${{ vars.VITE_AUTH_ENDPOINT }}
          VITE_PURCHASE_LOG_ENDPOINT: ${{ vars.VITE_PURCHASE_LOG_ENDPOINT }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$VITE_AUTH_ENDPOINT" ] && [ -n "$SUPABASE_PROJECT_REF" ]; then
            export VITE_AUTH_ENDPOINT="https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/auth"
          fi
          npm run build

      - name: Add GitHub Pages refresh fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
