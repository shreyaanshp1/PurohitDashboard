name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-supabase-functions.yml"
      - "supabase/functions/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        run: npm install -g supabase@latest

      - name: Deploy travel sheets function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: supabase functions deploy travel-sheets --project-ref "$SUPABASE_PROJECT_REF" --use-api

      - name: Deploy auth function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: supabase functions deploy auth --project-ref "$SUPABASE_PROJECT_REF" --use-api

      - name: Deploy travel master data function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: supabase functions deploy travel-master-data --project-ref "$SUPABASE_PROJECT_REF" --use-api
